# Deploy hosting, Firestore rules, and Cloud Functions on pushes to main.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_FUNCTIONS_REGION: ${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION }}
      VITE_R2_PUBLIC_BASE_URL: ${{ secrets.VITE_R2_PUBLIC_BASE_URL }}
      VITE_R2_SIGNER_URL: ${{ secrets.VITE_R2_SIGNER_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm --prefix functions ci
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FRATTERFRAMESPHOTOGRAPHY }}
      - name: Deploy to Firebase Hosting
        run: |
          set -o pipefail
          if ! npx --yes firebase-tools@latest deploy --only hosting --project fratterframesphotography --non-interactive 2>&1 | tee /tmp/hosting-deploy.log; then
            if grep -q 'is the current active version' /tmp/hosting-deploy.log; then
              echo 'Hosting is already on this version; treating as success.'
              exit 0
            fi
            exit 1
          fi
      - name: Deploy Firestore rules and Cloud Functions
        run: npx --yes firebase-tools@latest deploy --only firestore,functions --project fratterframesphotography --non-interactive
